name: AI Company Digest

on:
  schedule:
    - cron: '5 14 * * *'
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate digest
        run: node scripts/run-digest.js

      - name: Publish digest to workflow summary
        run: cat output/latest-digest.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit latest digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/latest-digest.md output/latest-items.json state/state.json
          git diff --cached --quiet || git commit -m "chore: update AI company digest [skip ci]"
          git push
